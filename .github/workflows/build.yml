name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: make all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: make build
        run: make all
