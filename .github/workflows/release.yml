name: Release

on:
  push:
    tags:
      - v*

jobs:
  release:
    name: make release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: make release
        run: make release
      - name: create release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          files: ./bin/*
          generate_release_notes: true
